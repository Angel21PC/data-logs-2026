<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hal - Pro Gym Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #09090b; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        
        /* FullCalendar Customization */
        .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255,255,255,0.05); }
        .fc-theme-standard .fc-scrollgrid { border-color: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .fc .fc-toolbar-title { font-size: 1.1rem; font-weight: 700; color: #e2e8f0; }
        .fc .fc-button-primary { background-color: #3b82f6 !important; border: none !important; border-radius: 8px; font-size: 0.8rem; text-transform: capitalize; }
        .fc-day-today { background-color: rgba(59, 130, 246, 0.15) !important; }
        .fc-event { border: none; padding: 2px 4px; font-weight: 600; font-size: 0.7rem; border-radius: 4px; cursor: pointer; transition: transform 0.2s; }
        .fc-event:hover { transform: scale(1.05); }
        .fc-daygrid-day-number { font-size: 0.8rem; color: #94a3b8; padding: 4px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modal Animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8 antialiased pb-20">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="pb-2 border-b border-zinc-800">
            <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-500 to-purple-500 tracking-tight">
                Centro de Entrenamiento
            </h1>
            <p class="text-slate-400 mt-2 text-sm md:text-base">Métricas Reales, Calendario Detallado y Progresión de Fuerza</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Calendar Section (Spans 1 col) -->
            <div class="glass-card p-5 lg:col-span-1">
                <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
                    Calendario (Click en un día)
                </h2>
                <div id="calendar" class="w-full"></div>
            </div>

            <!-- Chart Section (Spans 2 cols) -->
            <div class="glass-card p-5 lg:col-span-2 flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                    <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        Progresión de Peso Real
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="selectAll()" class="text-[10px] px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-slate-300 border border-zinc-700">Seleccionar Todo</button>
                        <button onclick="clearAll()" class="text-[10px] px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-slate-300 border border-zinc-700">Limpiar</button>
                    </div>
                </div>

                <!-- Filters -->
                <div id="filter-container" class="flex gap-2 overflow-x-auto hide-scrollbar pb-3 whitespace-nowrap mb-2">
                    <!-- Checkboxes injected via JS -->
                </div>

                <div class="h-[300px] md:h-[400px] w-full relative mt-2 flex-grow">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            
        </div>

        <!-- PR Table Section -->
        <div class="glass-card p-5 overflow-hidden">
            <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z" clip-rule="evenodd"/></svg>
                Tabla de Récords Personales (PRs)
            </h2>
            <div class="overflow-x-auto hide-scrollbar">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-zinc-900/50">
                        <tr class="text-xs uppercase tracking-wider text-slate-400">
                            <th class="py-3 px-4 font-semibold rounded-tl-lg">Ejercicio</th>
                            <th class="py-3 px-4 font-semibold text-right text-emerald-400">PR Real (Peso Bruto)</th>
                            <th class="py-3 px-4 font-semibold text-right text-purple-400">1RM Teórico</th>
                            <th class="py-3 px-4 font-semibold text-right rounded-tr-lg">Fecha del PR Real</th>
                        </tr>
                    </thead>
                    <tbody id="pr-table-body" class="divide-y divide-zinc-800/50 text-sm">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Day Details Modal -->
    <div id="dayModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 modal-overlay bg-black/60 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 w-full max-w-lg shadow-2xl modal-content max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
                <h3 id="modalDateTitle" class="text-xl font-bold text-white">Detalles del Día</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modalContent" class="overflow-y-auto hide-scrollbar flex-grow space-y-4 pr-2">
                <!-- Workout details injected here -->
            </div>
            <div class="mt-4 pt-4 border-t border-zinc-800 text-right">
                <button onclick="closeModal()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors">Cerrar</button>
            </div>
        </div>
    </div>

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            const routineColors = {
                'Día 1 - Upper FUERZA': '#3b82f6', // blue
                'Día 2 - Lower FUERZA': '#10b981', // emerald
                'Día 3 - HOMBROS + BRAZOS': '#8b5cf6', // violet
                'Día 4 - Upper HIPERTROFIA': '#f59e0b' // amber
            };

            const events = calendarEvents.map(e => ({
                title: e.title.replace('Día ', 'D'),
                start: e.date,
                backgroundColor: routineColors[e.title] || '#6366f1'
            }));

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                events: events,
                height: 'auto',
                firstDay: 1, // Lunes
                locale: 'es',
                eventClick: function(info) {
                    openModal(info.event.startStr, info.event.title);
                }
            });
            calendar.render();
        });

        // --- MODAL LOGIC ---
        function openModal(dateStr, routineName) {
            document.getElementById('modalDateTitle').innerText = dateStr + " | " + routineName;
            const content = document.getElementById('modalContent');
            content.innerHTML = '';

            const logs = detailsData[dateStr];
            if (!logs || logs.length === 0) {
                content.innerHTML = '<p class="text-slate-400 italic">No hay detalles registrados para este día.</p>';
            } else {
                // Group logs by exercise for cleaner display
                const grouped = {};
                logs.forEach(log => {
                    if (!grouped[log.exercise]) grouped[log.exercise] = [];
                    grouped[log.exercise].push(log);
                });

                for (const [exercise, sets] of Object.entries(grouped)) {
                    let html = `<div class="bg-zinc-800/50 p-3 rounded-xl border border-zinc-700/50">
                                    <h4 class="font-bold text-blue-400 mb-2">${exercise}</h4>
                                    <div class="space-y-1">`;
                    
                    sets.sort((a,b) => a.set - b.set).forEach(s => {
                        html += `<div class="flex justify-between text-sm text-slate-300 bg-zinc-900/50 px-3 py-1.5 rounded">
                                    <span>Serie ${s.set}</span>
                                    <span class="font-mono">${s.reps} reps <span class="text-slate-500 mx-1">x</span> <span class="font-bold text-white">${s.weight} kg</span></span>
                                 </div>`;
                    });
                    html += `</div></div>`;
                    content.innerHTML += html;
                }
            }

            document.getElementById('dayModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('dayModal').classList.add('hidden');

        const defaultSelected = ['Press banca', 'Sentadilla', 'Prensa', 'Press hombros con barra'];
        let selectedExercises = new Set(exercises.filter(e => defaultSelected.includes(e)));
        if (selectedExercises.size === 0 && exercises.length > 0) selectedExercises.add(exercises[0]);

        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#0ea5e9'];
        const colorMap = {};
        exercises.forEach((ex, i) => colorMap[ex] = colors[i % colors.length]);

        const filterContainer = document.getElementById('filter-container');
        
        function renderFilters() {
            filterContainer.innerHTML = '';
            exercises.forEach(ex => {
                const btn = document.createElement('button');
                const isActive = selectedExercises.has(ex);
                const color = colorMap[ex];
                
                if (isActive) {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-md";
                    btn.style.backgroundColor = color + '25';
                    btn.style.borderColor = color;
                    btn.style.color = color;
                } else {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium border bg-zinc-900 border-zinc-800 text-slate-500";
                }
                
                btn.innerText = ex;
                btn.onclick = () => toggleExercise(ex);
                filterContainer.appendChild(btn);
            });
        }

        function toggleExercise(ex) {
            if (selectedExercises.has(ex)) selectedExercises.delete(ex);
            else selectedExercises.add(ex);
            renderFilters();
            updateChart();
        }

        function selectAll() { exercises.forEach(e => selectedExercises.add(e)); renderFilters(); updateChart(); }
        function clearAll() { selectedExercises.clear(); renderFilters(); updateChart(); }

        const ctx = document.getElementById('progressChart').getContext('2d');
        let chart;

        function updateChart() {
            const dates = [...new Set(chartData.map(d => d.date))].sort();
            const datasets = [];
            
            selectedExercises.forEach(ex => {
                const exData = chartData.filter(d => d.exercise === ex);
                const dataPoints = dates.map(d => {
                    const point = exData.find(x => x.date === d);
                    return point ? point.weight : null;
                });

                datasets.push({
                    label: ex,
                    data: dataPoints,
                    borderColor: colorMap[ex],
                    backgroundColor: colorMap[ex],
                    borderWidth: 3,
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    pointBackgroundColor: '#09090b',
                    pointBorderWidth: 2,
                    spanGaps: true,
                    tension: 0.3
                });
            });

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: dates.map(d => d.substring(5)), datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {

                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255, 255, 255, 0.03)', drawBorder: false },
                            ticks: { padding: 8, font: { size: 11 } },
                            title: { display: true, text: 'Peso Máximo Real (kg)', color: '#71717a', font: { size: 10, weight: 'bold' } }
                        },
                        x: { 
                            grid: { display: false, drawBorder: false },
                            ticks: { padding: 8, font: { size: 11 }, maxRotation: 45, minRotation: 45 }
                        }
                    }
                }
            });
        }
