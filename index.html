<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hal - Gym Dashboard V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-3 md:p-8 antialiased pb-20">
    <div class="max-w-7xl mx-auto space-y-4 md:space-y-6">
        
        <div class="text-center md:text-left pt-2 pb-4">
            <h1 class="text-2xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 tracking-tight">
                Dashboard V4 (Intensidad)
            </h1>
            <p class="text-slate-400 mt-1 font-medium text-xs md:text-base">Métricas de Fatiga (RIR), 1RM y Volumen</p>
        </div>

        <div class="glass-panel p-3 shadow-xl sticky top-2 z-50">
            <div class="flex flex-wrap md:flex-nowrap gap-1 bg-slate-800/80 p-1 rounded-lg border border-slate-700/50">
                <button onclick="setMetric('onerm')" id="btn-metric-onerm" class="flex-1 min-w-[70px] py-2 rounded-md text-xs font-bold bg-purple-600 text-white shadow-lg transition-colors">1RM</button>
                <button onclick="setMetric('volume')" id="btn-metric-volume" class="flex-1 min-w-[70px] py-2 rounded-md text-xs font-medium text-slate-400 hover:text-white transition-colors">Volumen</button>
                <button onclick="setMetric('rir')" id="btn-metric-rir" class="flex-1 min-w-[70px] py-2 rounded-md text-xs font-medium text-slate-400 hover:text-white transition-colors flex items-center justify-center gap-1">
                    Intensidad (RIR)
                </button>
            </div>
        </div>

        <div class="glass-panel p-3 md:p-6 shadow-xl">
            <div class="h-[300px] md:h-[500px] w-full relative">
                <canvas id="progressChart"></canvas>
            </div>
            <p id="chart-description" class="text-[10px] md:text-xs text-slate-400 mt-3 text-center px-4">
                * 1RM (One Rep Max) es tu fuerza real teórica a 1 repetición (Fórmula de Epley).
            </p>
        </div>

        <div class="glass-panel p-4 shadow-xl">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Filtros</h2>
                <div class="flex gap-2">
                    <button onclick="clearAll()" class="text-[10px] px-2 py-1 rounded bg-slate-800 text-slate-400 border border-slate-700">Limpiar</button>
                </div>
            </div>
            <div id="filter-container" class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 whitespace-nowrap">
            </div>
        </div>

        <div class="glass-panel p-4 shadow-xl overflow-hidden">
            <h2 class="text-sm font-bold text-slate-200 mb-3 uppercase tracking-wide flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                Récords 1RM
            </h2>
            <div class="overflow-x-auto hide-scrollbar">
                <table class="w-full text-left whitespace-nowrap">
                    <tbody id="pr-table-body" class="divide-y divide-slate-800/60 text-xs">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const rawData = [{"date": "2026-03-09", "exercise": "Elevaciones laterales", "weight": 8.0, "onerm": 11.2, "volume": 288, "rir": null}, {"date": "2026-03-09", "exercise": "Press banca", "weight": 74.0, "onerm": 86.3, "volume": 1850, "rir": null}, {"date": "2026-03-09", "exercise": "Press cerrado", "weight": 22.0, "onerm": 27.9, "volume": 528, "rir": null}, {"date": "2026-03-09", "exercise": "Press militar mancuernas", "weight": 22.0, "onerm": 26.4, "volume": 528, "rir": null}, {"date": "2026-03-09", "exercise": "Remo mancuernas", "weight": 24.0, "onerm": 28.8, "volume": 432, "rir": null}, {"date": "2026-03-11", "exercise": "Prensa", "weight": 170.0, "onerm": 215.3, "volume": 4080, "rir": null}, {"date": "2026-03-11", "exercise": "Sentadilla", "weight": 100.0, "onerm": 116.7, "volume": 2400, "rir": null}, {"date": "2026-03-12", "exercise": "Curl b\u00edceps barra", "weight": 30.0, "onerm": 40.0, "volume": 900, "rir": null}, {"date": "2026-03-12", "exercise": "Curl martillo", "weight": 16.0, "onerm": 22.4, "volume": 576, "rir": null}, {"date": "2026-03-12", "exercise": "Extensi\u00f3n tr\u00edceps polea", "weight": 15.0, "onerm": 21.0, "volume": 540, "rir": null}, {"date": "2026-03-12", "exercise": "Press hombros con barra", "weight": 30.0, "onerm": 38.0, "volume": 960, "rir": null}, {"date": "2026-03-12", "exercise": "Putada", "weight": 3.0, "onerm": 4.0, "volume": 90, "rir": null}, {"date": "2026-03-12", "exercise": "P\u00e1jaros / Polea", "weight": 6.0, "onerm": 8.4, "volume": 288, "rir": null}, {"date": "2026-03-16", "exercise": "Elevaciones laterales", "weight": 8.0, "onerm": 11.2, "volume": 288, "rir": null}, {"date": "2026-03-16", "exercise": "Press banca", "weight": 74.0, "onerm": 86.3, "volume": 1850, "rir": null}, {"date": "2026-03-16", "exercise": "Press cerrado", "weight": 22.0, "onerm": 27.9, "volume": 528, "rir": null}, {"date": "2026-03-16", "exercise": "Press militar mancuernas", "weight": 22.0, "onerm": 26.4, "volume": 528, "rir": null}, {"date": "2026-03-16", "exercise": "Remo mancuernas", "weight": 24.0, "onerm": 28.8, "volume": 432, "rir": null}, {"date": "2026-03-17", "exercise": "Curl femoral", "weight": 60.0, "onerm": 80.0, "volume": 1800, "rir": null}, {"date": "2026-03-17", "exercise": "Prensa", "weight": 180.0, "onerm": 228.0, "volume": 4160, "rir": null}, {"date": "2026-03-17", "exercise": "Sentadilla", "weight": 100.0, "onerm": 116.7, "volume": 2425, "rir": null}, {"date": "2026-03-17", "exercise": "Zancadas", "weight": 14.0, "onerm": 17.7, "volume": 448, "rir": null}, {"date": "2026-03-18", "exercise": "Curl b\u00edceps barra", "weight": 30.0, "onerm": 40.0, "volume": 900, "rir": null}, {"date": "2026-03-18", "exercise": "Curl martillo", "weight": 18.0, "onerm": 25.2, "volume": 648, "rir": null}, {"date": "2026-03-18", "exercise": "M\u00e1quina de hombros", "weight": 70.0, "onerm": 93.3, "volume": 2100, "rir": null}, {"date": "2026-03-18", "exercise": "Press franc\u00e9s", "weight": 20.0, "onerm": 28.0, "volume": 720, "rir": null}, {"date": "2026-03-18", "exercise": "Press hombros con barra", "weight": 30.0, "onerm": 38.0, "volume": 960, "rir": null}, {"date": "2026-03-18", "exercise": "P\u00e1jaros / Polea", "weight": 6.0, "onerm": 8.4, "volume": 288, "rir": null}, {"date": "2026-03-23", "exercise": "Press banca", "weight": 80.0, "onerm": 93.3, "volume": 1520, "rir": null}, {"date": "2026-03-24", "exercise": "Prensa", "weight": 200.0, "onerm": 280.0, "volume": 9600, "rir": null}, {"date": "2026-03-24", "exercise": "Zancadas", "weight": 16.0, "onerm": 20.3, "volume": 512, "rir": null}, {"date": "2026-03-26", "exercise": "Aperturas", "weight": 8.0, "onerm": 12.0, "volume": 360, "rir": null}, {"date": "2026-03-26", "exercise": "Elevaciones Laterales", "weight": 8.0, "onerm": 12.0, "volume": 360, "rir": null}, {"date": "2026-03-26", "exercise": "Face pull", "weight": 15.0, "onerm": 22.5, "volume": 675, "rir": null}, {"date": "2026-03-26", "exercise": "Jal\u00f3n", "weight": 60.0, "onerm": 84.0, "volume": 2880, "rir": null}, {"date": "2026-03-26", "exercise": "Press inclinado", "weight": 22.0, "onerm": 30.8, "volume": 792, "rir": null}, {"date": "2026-03-26", "exercise": "Remo Polea", "weight": 60.0, "onerm": 84.0, "volume": 2160, "rir": null}, {"date": "2026-03-30", "exercise": "Aperturas mancuernas", "weight": 10.0, "onerm": 14.0, "volume": 360, "rir": null}, {"date": "2026-03-30", "exercise": "Jal\u00f3n al pecho", "weight": 60.0, "onerm": 76.0, "volume": 1920, "rir": null}, {"date": "2026-03-30", "exercise": "Press banca", "weight": 76.0, "onerm": 88.7, "volume": 1900, "rir": null}, {"date": "2026-04-13", "exercise": "Face pull", "weight": 20.0, "onerm": 28.0, "volume": 240, "rir": 3.0}, {"date": "2026-04-13", "exercise": "Press banca", "weight": 58.0, "onerm": 88.9, "volume": 3712, "rir": 0.0}, {"date": "2026-04-13", "exercise": "Press cerrado", "weight": 18.0, "onerm": 22.8, "volume": 576, "rir": 0.0}, {"date": "2026-04-13", "exercise": "Press inclinado", "weight": 50.0, "onerm": 70.0, "volume": 2400, "rir": 0.0}];
        let currentMetric = 'onerm';

        const exercises = [...new Set(rawData.map(d => d.exercise))].sort();
        const defaultSelected = ['Press banca', 'Press inclinado', 'Press cerrado', 'Remo en polea', 'Face pull'];
        let selectedExercises = new Set();
        exercises.forEach(e => { if(defaultSelected.includes(e)) selectedExercises.add(e); });
        if (selectedExercises.size === 0 && exercises.length > 0) selectedExercises.add(exercises[0]);

        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#0ea5e9'];
        const colorMap = {};
        exercises.forEach((ex, i) => colorMap[ex] = colors[i % colors.length]);

        const filterContainer = document.getElementById('filter-container');
        
        function renderFilters() {
            filterContainer.innerHTML = '';
            exercises.forEach(ex => {
                const btn = document.createElement('button');
                const isActive = selectedExercises.has(ex);
                const color = colorMap[ex];
                
                if (isActive) {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-md";
                    btn.style.backgroundColor = color + '25';
                    btn.style.borderColor = color;
                    btn.style.color = color;
                } else {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium border bg-slate-800/80 border-slate-700 text-slate-500";
                }
                
                btn.innerText = ex;
                btn.onclick = () => toggleExercise(ex);
                filterContainer.appendChild(btn);
            });
        }

        function toggleExercise(ex) {
            if (selectedExercises.has(ex)) selectedExercises.delete(ex);
            else selectedExercises.add(ex);
            renderFilters();
            updateChart();
        }
        
        function clearAll() {
            selectedExercises.clear();
            renderFilters();
            updateChart();
        }

        function setMetric(metric) {
            currentMetric = metric;
            const btns = ['onerm', 'volume', 'rir'];
            btns.forEach(m => {
                const el = document.getElementById('btn-metric-' + m);
                if (m === metric) el.className = "flex-1 min-w-[70px] py-2 rounded-md text-xs font-bold bg-purple-600 text-white shadow-lg transition-colors";
                else el.className = "flex-1 min-w-[70px] py-2 rounded-md text-xs font-medium text-slate-400 hover:text-white transition-colors bg-transparent";
                
                if(m === 'rir' && metric === 'rir') el.classList.add('bg-red-600');
            });

            const desc = document.getElementById('chart-description');
            if(metric === 'onerm') desc.innerHTML = "* 1RM (One Rep Max) es el peso máximo teórico a una repetición.";
            else if(metric === 'volume') desc.innerHTML = "* Volumen Total: Kilos totales movidos (Series x Reps x Peso).";
            else if(metric === 'rir') desc.innerHTML = "* RIR (Reps in Reserve): Un valor de 0 significa Fallo Muscular (Hipertrofia pura). Cuanto más arriba esté el punto (cerca de 0), más duro entrenaste.";

            updateChart();
        }

        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = 'Inter';
        const ctx = document.getElementById('progressChart').getContext('2d');
        let chart;

        function updateChart() {
            let dates = [...new Set(rawData.map(d => d.date))].sort();
            
            if (currentMetric === 'rir') {
                const datesWithRir = new Set(rawData.filter(d => d.rir !== null).map(d => d.date));
                dates = [...datesWithRir].sort();
            }

            const datasets = [];
            
            selectedExercises.forEach(ex => {
                const exData = rawData.filter(d => d.exercise === ex);
                const dataPoints = dates.map(d => {
                    const point = exData.find(x => x.date === d);
                    if (!point) return null;
                    if (currentMetric === 'onerm') return point.onerm;
                    if (currentMetric === 'volume') return point.volume;
                    if (currentMetric === 'rir') return point.rir !== null ? point.rir : null;
                    return null;
                });

                datasets.push({
                    label: ex,
                    data: dataPoints,
                    borderColor: colorMap[ex],
                    backgroundColor: colorMap[ex],
                    borderWidth: 2.5,
                    pointRadius: currentMetric === 'rir' ? 6 : 3,
                    pointHoverRadius: 8,
                    pointBackgroundColor: currentMetric === 'rir' ? colorMap[ex] : '#0f172a',
                    pointBorderWidth: 2,
                    spanGaps: true,
                    tension: 0.3
                });
            });

            if (chart) chart.destroy();

            const isRir = currentMetric === 'rir';

            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: dates.map(d => d.substring(5)), datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleFont: { size: 11 },
                            bodyFont: { size: 12, weight: 'bold' },
                            padding: 10,
                            borderColor: 'rgba(51, 65, 85, 0.8)',
                            borderWidth: 1,
                            cornerRadius: 8,
                            usePointStyle: true,
                            boxPadding: 4,
                            callbacks: { 
                                label: (context) => {
                                    if (currentMetric === 'rir') return ` ${context.dataset.label}: RIR ${context.parsed.y} (Al fallo)`
                                    return ` ${context.dataset.label}: ${context.parsed.y}`
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            reverse: isRir,
                            grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false },
                            ticks: { padding: 5, maxTicksLimit: 6, font: { size: 10 }, stepSize: isRir ? 1 : undefined },
                            min: isRir ? 0 : undefined,
                            max: isRir ? 5 : undefined
                        },
                        x: { 
                            grid: { display: false, drawBorder: false },
                            ticks: { padding: 5, maxRotation: 45, minRotation: 45, font: { size: 10 } }
                        }
                    }
                }
            });
        }

        function renderTableAndStats() {
            const tbody = document.getElementById('pr-table-body');
            const prs = {};

            rawData.forEach(d => {
                if (!prs[d.exercise] || d.onerm > prs[d.exercise].onerm) {
                    prs[d.exercise] = { onerm: d.onerm, weight: d.weight, date: d.date };
                }
            });

            const sortedExercises = Object.keys(prs).sort((a, b) => prs[b].onerm - prs[a].onerm);

            sortedExercises.forEach(ex => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-3 px-2 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full" style="background-color: ${colorMap[ex]}"></div>
                        <span class="font-medium text-slate-300 truncate max-w-[120px]">${ex}</span>
                    </td>
                    <td class="py-3 px-2 text-right font-bold text-purple-400">${prs[ex].onerm}</td>
                    <td class="py-3 px-2 text-right text-slate-500 font-mono text-[10px]">${prs[ex].date.substring(5)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        renderFilters();
        updateChart();
        renderTableAndStats();
    </script>
</body>
</html>
