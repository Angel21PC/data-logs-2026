<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hal - Pro Gym Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #09090b; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255,255,255,0.05); }
        .fc-theme-standard .fc-scrollgrid { border-color: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .fc .fc-toolbar-title { font-size: 1.1rem; font-weight: 700; color: #e2e8f0; }
        .fc .fc-button-primary { background-color: #3b82f6 !important; border: none !important; border-radius: 8px; font-size: 0.8rem; text-transform: capitalize; }
        .fc-day-today { background-color: rgba(59, 130, 246, 0.15) !important; }
        .fc-event { border: none; padding: 2px 4px; font-weight: 600; font-size: 0.7rem; border-radius: 4px; cursor: pointer; transition: transform 0.2s; }
        .fc-event:hover { transform: scale(1.05); }
        .fc-daygrid-day-number { font-size: 0.8rem; color: #94a3b8; padding: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8 antialiased pb-20">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="pb-2 border-b border-zinc-800">
            <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-500 to-purple-500 tracking-tight">
                Centro de Entrenamiento
            </h1>
            <p class="text-slate-400 mt-2 text-sm md:text-base">Métricas Reales, Calendario Detallado y Progresión de Fuerza</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="glass-card p-5 lg:col-span-1">
                <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                    Calendario (Toca un día)
                </h2>
                <div id="calendar" class="w-full"></div>
            </div>

            <div class="glass-card p-5 lg:col-span-2 flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                    <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                        Progresión de Peso Bruto (Real)
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="selectAll()" class="text-[10px] px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-slate-300 border border-zinc-700">Todos</button>
                        <button onclick="clearAll()" class="text-[10px] px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-slate-300 border border-zinc-700">Limpiar</button>
                    </div>
                </div>

                <div id="filter-container" class="flex gap-2 overflow-x-auto hide-scrollbar pb-3 whitespace-nowrap mb-2">
                </div>

                <div class="h-[300px] md:h-[400px] w-full relative mt-2 flex-grow">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            
        </div>

        <div class="glass-card p-5 overflow-hidden">
            <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                Récords Personales (PRs Reales)
            </h2>
            <div class="overflow-x-auto hide-scrollbar">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-zinc-900/50">
                        <tr class="text-xs uppercase tracking-wider text-slate-400">
                            <th class="py-3 px-4 font-semibold rounded-tl-lg">Ejercicio</th>
                            <th class="py-3 px-4 font-semibold text-right text-emerald-400">PR Real (Peso)</th>
                            <th class="py-3 px-4 font-semibold text-right text-purple-400">1RM Teórico</th>
                            <th class="py-3 px-4 font-semibold text-right rounded-tr-lg">Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="pr-table-body" class="divide-y divide-zinc-800/50 text-sm">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Day Details Modal -->
    <div id="dayModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4 modal-overlay bg-black/70 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 w-full max-w-lg shadow-2xl modal-content max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
                <h3 id="modalDateTitle" class="text-lg md:text-xl font-bold text-white truncate pr-2">Detalles del Día</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition-colors">
                    X
                </button>
            </div>
            <div id="modalContent" class="overflow-y-auto hide-scrollbar flex-grow space-y-4 pr-1">
            </div>
            <div class="mt-5 pt-4 border-t border-zinc-800">
                <button onclick="closeModal()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-lg">Cerrar</button>
            </div>
        </div>
    </div>

        // --- CALENDAR LOGIC ---
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const routineColors = {
                'Día 1 - Upper FUERZA': '#3b82f6', 
                'Día 2 - Lower FUERZA': '#10b981', 
                'Día 3 - HOMBROS + BRAZOS': '#8b5cf6', 
                'Día 4 - Upper HIPERTROFIA': '#f59e0b' 
            };
            const events = calendarEvents.map(e => ({
                title: e.title.replace('Día ', 'D'),
                start: e.date,
                backgroundColor: routineColors[e.title] || '#6366f1'
            }));
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                events: events,
                height: 'auto',
                firstDay: 1, 
                locale: 'es',
                eventClick: function(info) {
                    openModal(info.event.startStr, info.event.title);
                }
            });
            calendar.render();
        });

        // --- MODAL LOGIC ---
        function openModal(dateStr, routineName) {
            document.getElementById('modalDateTitle').innerText = dateStr + " | " + routineName;
            const content = document.getElementById('modalContent');
            content.innerHTML = '';
            const logs = detailsData[dateStr];
            if (!logs || logs.length === 0) {
                content.innerHTML = '<p class="text-slate-400 italic text-center py-4">No hay detalles registrados para este día.</p>';
            } else {
                const grouped = {};
                logs.forEach(log => {
                    if (!grouped[log.exercise]) grouped[log.exercise] = [];
                    grouped[log.exercise].push(log);
                });
                for (const [exercise, sets] of Object.entries(grouped)) {
                    let html = `<div class="bg-zinc-800/40 p-4 rounded-xl border border-zinc-700/50 shadow-sm">
                                    <h4 class="font-bold text-indigo-400 mb-3 flex items-center gap-2">
                                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>${exercise}
                                    </h4>
                                    <div class="space-y-1.5">`;
                    sets.sort((a,b) => a.set - b.set).forEach(s => {
                        html += `<div class="flex justify-between items-center text-sm text-slate-300 bg-zinc-900/60 px-4 py-2 rounded-lg">
                                    <span class="text-slate-500 font-medium">Serie ${s.set}</span>
                                    <span class="font-mono bg-zinc-800 px-2 py-0.5 rounded text-white shadow-inner">
                                        ${s.reps} <span class="text-slate-500 text-xs">x</span> ${s.weight} kg
                                    </span>
                                 </div>`;
                    });
                    html += `</div></div>`;
                    content.innerHTML += html;
                }
            }
            document.getElementById('dayModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('dayModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.getElementById('dayModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // --- CHART LOGIC ---
        const exercises = [...new Set(chartData.map(d => d.exercise))].sort();
        const defaultSelected = ['Press banca', 'Sentadilla', 'Prensa', 'Press hombros con barra'];
        let selectedExercises = new Set(exercises.filter(e => defaultSelected.includes(e)));
        if (selectedExercises.size === 0 && exercises.length > 0) selectedExercises.add(exercises[0]);

        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#0ea5e9'];
        const colorMap = {};
        exercises.forEach((ex, i) => colorMap[ex] = colors[i % colors.length]);

        const filterContainer = document.getElementById('filter-container');
        function renderFilters() {
            filterContainer.innerHTML = '';
            exercises.forEach(ex => {
                const btn = document.createElement('button');
                const isActive = selectedExercises.has(ex);
                const color = colorMap[ex];
                if (isActive) {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-md transition-transform active:scale-95";
                    btn.style.backgroundColor = color + '25';
                    btn.style.borderColor = color;
                    btn.style.color = color;
                } else {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium border bg-zinc-900 border-zinc-800 text-slate-500 transition-colors hover:bg-zinc-800";
                }
                btn.innerText = ex;
                btn.onclick = () => toggleExercise(ex);
                filterContainer.appendChild(btn);
            });
        }

        function toggleExercise(ex) {
            if (selectedExercises.has(ex)) selectedExercises.delete(ex);
            else selectedExercises.add(ex);
            renderFilters();
            updateChart();
        }

        function selectAll() { exercises.forEach(e => selectedExercises.add(e)); renderFilters(); updateChart(); }
        function clearAll() { selectedExercises.clear(); renderFilters(); updateChart(); }

        Chart.defaults.color = '#71717a';
        Chart.defaults.font.family = 'Inter';
        const ctx = document.getElementById('progressChart').getContext('2d');
        let chart;

        function updateChart() {
            const dates = [...new Set(chartData.map(d => d.date))].sort();
            const datasets = [];
            
            selectedExercises.forEach(ex => {
                const exData = chartData.filter(d => d.exercise === ex);
                const dataPoints = dates.map(d => {
                    const point = exData.find(x => x.date === d);
                    return point ? point.weight : null;
                });

                datasets.push({
                    label: ex,
                    data: dataPoints,
                    borderColor: colorMap[ex],
                    backgroundColor: colorMap[ex],
                    borderWidth: 3,
                    pointRadius: 4,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#09090b',
                    pointBorderWidth: 2,
                    spanGaps: true,
                    tension: 0.3
                });
            });

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: dates.map(d => d.substring(5)), datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(24, 24, 27, 0.95)',
                            titleFont: { size: 12 },
                            bodyFont: { size: 13, weight: 'bold' },
                            padding: 12,
                            borderColor: 'rgba(63, 63, 70, 0.8)',
                            borderWidth: 1,
                            cornerRadius: 8,
                            usePointStyle: true,
                            callbacks: { label: (context) => ` ${context.dataset.label}: ${context.parsed.y} kg` }
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255, 255, 255, 0.03)', drawBorder: false },
                            ticks: { padding: 8, font: { size: 11 } },
                            title: { display: true, text: 'Kilos Brutos', color: '#71717a', font: { size: 10, weight: 'bold' } }
                        },
                        x: { 
                            grid: { display: false, drawBorder: false },
                            ticks: { padding: 8, font: { size: 11 }, maxRotation: 45, minRotation: 45 }
                        }
                    }
                }
            });
        }

                    <td class="py-3 px-4 text-right text-purple-400 font-medium">

                `;
                tbody.appendChild(tr);

        }

        renderFilters();
        updateChart();
        renderPRTable();
