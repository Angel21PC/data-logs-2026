<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Monitoreo - GPT Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #09090b; color: #f8fafc; font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        
        /* FullCalendar Customization for Dark Theme */
        .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255,255,255,0.1); }
        .fc-theme-standard .fc-scrollgrid { border-color: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; }
        .fc .fc-button-primary { background-color: #3b82f6 !important; border-color: #3b82f6 !important; border-radius: 8px; }
        .fc .fc-button-primary:hover { background-color: #2563eb !important; border-color: #2563eb !important; }
        .fc-day-today { background-color: rgba(59, 130, 246, 0.1) !important; }
        .fc-event { border: none; padding: 3px; font-weight: 600; cursor: pointer; border-radius: 6px; }
        
        .custom-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-3 md:p-6 antialiased pb-20">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="text-center md:text-left py-4">
            <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-tight">
                Panel de Monitoreo de Entrenamiento
            </h1>
            <p class="text-slate-400 mt-2 font-medium">Motor IA: GPT-5 · Seguimiento Integral de Rutinas y Fuerza</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Calendario (Spans 1 col on Desktop) -->
            <div class="glass-card p-5 shadow-2xl lg:col-span-1">
                <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Calendario de Rutinas
                </h2>
                <div id="calendar" class="text-xs"></div>
            </div>

            <!-- Main Chart & Filters (Spans 2 cols) -->
            <div class="glass-card p-5 shadow-2xl lg:col-span-2 flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                    <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                        <svg class="w-5 h-5 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        Progresión de Fuerza
                    </h2>
                    <div class="flex gap-1 bg-zinc-900 p-1 rounded-lg border border-zinc-800">
                        <button onclick="setMetric('onerm')" id="btn-metric-onerm" class="px-3 py-1.5 rounded text-xs font-bold bg-indigo-500 text-white shadow-lg transition-colors">1RM Est.</button>
                        <button onclick="setMetric('weight')" id="btn-metric-weight" class="px-3 py-1.5 rounded text-xs font-medium text-slate-400 hover:text-white transition-colors">Kilos Brutos</button>
                    </div>
                </div>

                <!-- Filters -->
                <div id="filter-container" class="flex gap-2 overflow-x-auto custom-scrollbar pb-3 whitespace-nowrap mb-2">
                    <!-- Checkboxes injected via JS -->
                </div>

                <div class="h-[350px] w-full relative mt-2 flex-grow">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            
        </div>

        <!-- Rutinas y Récords (Table) -->
        <div class="glass-card p-5 shadow-2xl overflow-hidden">
            <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                Récords Históricos (PRs)
            </h2>
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-zinc-900/80">
                        <tr class="text-xs uppercase tracking-wider text-slate-400">
                            <th class="py-3 px-4 font-semibold rounded-tl-lg">Ejercicio</th>
                            <th class="py-3 px-4 font-semibold text-right text-indigo-400">PR (1RM)</th>
                            <th class="py-3 px-4 font-semibold text-right">Peso Bruto Max</th>
                            <th class="py-3 px-4 font-semibold text-right rounded-tr-lg">Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="pr-table-body" class="divide-y divide-zinc-800/60 text-sm">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const chartData = [{"date": "2026-03-09", "exercise": "Elevaciones laterales", "weight": 8.0, "onerm": 11.2}, {"date": "2026-03-09", "exercise": "Press banca", "weight": 74.0, "onerm": 86.3}, {"date": "2026-03-09", "exercise": "Press cerrado", "weight": 22.0, "onerm": 27.9}, {"date": "2026-03-09", "exercise": "Press militar mancuernas", "weight": 22.0, "onerm": 26.4}, {"date": "2026-03-09", "exercise": "Remo mancuernas", "weight": 24.0, "onerm": 28.8}, {"date": "2026-03-11", "exercise": "Prensa", "weight": 170.0, "onerm": 215.3}, {"date": "2026-03-11", "exercise": "Sentadilla", "weight": 100.0, "onerm": 116.7}, {"date": "2026-03-12", "exercise": "Curl b\u00edceps barra", "weight": 30.0, "onerm": 40.0}, {"date": "2026-03-12", "exercise": "Curl martillo", "weight": 16.0, "onerm": 22.4}, {"date": "2026-03-12", "exercise": "Extensi\u00f3n tr\u00edceps polea", "weight": 15.0, "onerm": 21.0}, {"date": "2026-03-12", "exercise": "Press hombros con barra", "weight": 30.0, "onerm": 38.0}, {"date": "2026-03-12", "exercise": "Putada", "weight": 3.0, "onerm": 4.0}, {"date": "2026-03-12", "exercise": "P\u00e1jaros / Polea", "weight": 6.0, "onerm": 8.4}, {"date": "2026-03-16", "exercise": "Elevaciones laterales", "weight": 8.0, "onerm": 11.2}, {"date": "2026-03-16", "exercise": "Press banca", "weight": 74.0, "onerm": 86.3}, {"date": "2026-03-16", "exercise": "Press cerrado", "weight": 22.0, "onerm": 27.9}, {"date": "2026-03-16", "exercise": "Press militar mancuernas", "weight": 22.0, "onerm": 26.4}, {"date": "2026-03-16", "exercise": "Remo mancuernas", "weight": 24.0, "onerm": 28.8}, {"date": "2026-03-17", "exercise": "Curl femoral", "weight": 60.0, "onerm": 80.0}, {"date": "2026-03-17", "exercise": "Prensa", "weight": 180.0, "onerm": 228.0}, {"date": "2026-03-17", "exercise": "Sentadilla", "weight": 100.0, "onerm": 116.7}, {"date": "2026-03-17", "exercise": "Zancadas", "weight": 14.0, "onerm": 17.7}, {"date": "2026-03-18", "exercise": "Curl b\u00edceps barra", "weight": 30.0, "onerm": 40.0}, {"date": "2026-03-18", "exercise": "Curl martillo", "weight": 18.0, "onerm": 25.2}, {"date": "2026-03-18", "exercise": "M\u00e1quina de hombros", "weight": 70.0, "onerm": 93.3}, {"date": "2026-03-18", "exercise": "Press franc\u00e9s", "weight": 20.0, "onerm": 28.0}, {"date": "2026-03-18", "exercise": "Press hombros con barra", "weight": 30.0, "onerm": 38.0}, {"date": "2026-03-18", "exercise": "P\u00e1jaros / Polea", "weight": 6.0, "onerm": 8.4}, {"date": "2026-03-23", "exercise": "Press banca", "weight": 80.0, "onerm": 93.3}, {"date": "2026-03-24", "exercise": "Prensa", "weight": 200.0, "onerm": 280.0}, {"date": "2026-03-24", "exercise": "Zancadas", "weight": 16.0, "onerm": 20.3}, {"date": "2026-03-26", "exercise": "Aperturas", "weight": 8.0, "onerm": 12.0}, {"date": "2026-03-26", "exercise": "Elevaciones Laterales", "weight": 8.0, "onerm": 12.0}, {"date": "2026-03-26", "exercise": "Face pull", "weight": 15.0, "onerm": 22.5}, {"date": "2026-03-26", "exercise": "Jal\u00f3n", "weight": 60.0, "onerm": 84.0}, {"date": "2026-03-26", "exercise": "Press inclinado", "weight": 22.0, "onerm": 30.8}, {"date": "2026-03-26", "exercise": "Remo Polea", "weight": 60.0, "onerm": 84.0}, {"date": "2026-03-30", "exercise": "Aperturas mancuernas", "weight": 10.0, "onerm": 14.0}, {"date": "2026-03-30", "exercise": "Jal\u00f3n al pecho", "weight": 60.0, "onerm": 76.0}, {"date": "2026-03-30", "exercise": "Press banca", "weight": 76.0, "onerm": 88.7}, {"date": "2026-04-13", "exercise": "Face pull", "weight": 20.0, "onerm": 28.0}, {"date": "2026-04-13", "exercise": "Press banca", "weight": 58.0, "onerm": 88.9}, {"date": "2026-04-13", "exercise": "Press cerrado", "weight": 18.0, "onerm": 22.8}, {"date": "2026-04-13", "exercise": "Press inclinado", "weight": 50.0, "onerm": 70.0}];
        const calendarData = [{"date": "2026-03-09", "routine": "D\u00eda 1 - Upper FUERZA"}, {"date": "2026-03-11", "routine": "D\u00eda 2 - Lower FUERZA"}, {"date": "2026-03-12", "routine": "D\u00eda 3 - HOMBROS + BRAZOS"}, {"date": "2026-03-16", "routine": "D\u00eda 1 - Upper FUERZA"}, {"date": "2026-03-17", "routine": "D\u00eda 2 - Lower FUERZA"}, {"date": "2026-03-18", "routine": "D\u00eda 3 - HOMBROS + BRAZOS"}, {"date": "2026-03-23", "routine": "D\u00eda 1 - Upper FUERZA"}, {"date": "2026-03-24", "routine": "D\u00eda 2 - Lower FUERZA"}, {"date": "2026-03-26", "routine": "D\u00eda 4 - Upper HIPERTROFIA"}, {"date": "2026-03-30", "routine": "D\u00eda 1 - Upper FUERZA"}, {"date": "2026-04-13", "routine": "D\u00eda 1 - Upper FUERZA"}];
        
        let currentMetric = 'onerm';

        // Set up FullCalendar
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            // Map routines to colors
            const routineColors = {
                'Día 1 - Upper FUERZA': '#3b82f6', // blue
                'Día 2 - Lower FUERZA': '#10b981', // emerald
                'Día 3 - HOMBROS + BRAZOS': '#8b5cf6', // violet
                'Día 4 - Upper HIPERTROFIA': '#f59e0b' // amber
            };

            const events = calendarData.map(d => ({
                title: d.routine.replace('Día ', 'D'),
                start: d.date,
                backgroundColor: routineColors[d.routine] || '#6366f1',
                allDay: true
            }));

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                events: events,
                height: 'auto',
                firstDay: 1, // Lunes
                locale: 'es'
            });
            calendar.render();
        });

        // Chart Logic
        const exercises = [...new Set(chartData.map(d => d.exercise))].sort();
        const defaultSelected = ['Press banca', 'Sentadilla', 'Prensa', 'Press militar mancuernas'];
        let selectedExercises = new Set(exercises.filter(e => defaultSelected.includes(e)));
        if (selectedExercises.size === 0 && exercises.length > 0) selectedExercises.add(exercises[0]);

        const colors = ['#818cf8', '#34d399', '#fbbf24', '#f87171', '#a78bfa', '#f472b6', '#2dd4bf', '#fb923c'];
        const colorMap = {};
        exercises.forEach((ex, i) => colorMap[ex] = colors[i % colors.length]);

        const filterContainer = document.getElementById('filter-container');
        
        function renderFilters() {
            filterContainer.innerHTML = '';
            exercises.forEach(ex => {
                const btn = document.createElement('button');
                const isActive = selectedExercises.has(ex);
                const color = colorMap[ex];
                
                if (isActive) {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-md transition-transform scale-105";
                    btn.style.backgroundColor = color + '30';
                    btn.style.borderColor = color;
                    btn.style.color = color;
                } else {
                    btn.className = "flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium border bg-zinc-900 border-zinc-800 text-slate-500 hover:text-slate-300";
                }
                
                btn.innerText = ex;
                btn.onclick = () => toggleExercise(ex);
                filterContainer.appendChild(btn);
            });
        }

        function toggleExercise(ex) {
            if (selectedExercises.has(ex)) selectedExercises.delete(ex);
            else selectedExercises.add(ex);
            renderFilters();
            updateChart();
        }

        function setMetric(metric) {
            currentMetric = metric;
            const btns = ['onerm', 'weight'];
            btns.forEach(m => {
                const el = document.getElementById('btn-metric-' + m);
                if (m === metric) el.className = "px-3 py-1.5 rounded text-xs font-bold bg-indigo-500 text-white shadow-lg transition-colors";
                else el.className = "px-3 py-1.5 rounded text-xs font-medium text-slate-400 hover:text-white transition-colors bg-transparent";
            });
            updateChart();
        }

        Chart.defaults.color = '#71717a';
        Chart.defaults.font.family = 'Outfit';
        const ctx = document.getElementById('progressChart').getContext('2d');
        let chart;

        function updateChart() {
            const dates = [...new Set(chartData.map(d => d.date))].sort();
            const datasets = [];
            
            selectedExercises.forEach(ex => {
                const exData = chartData.filter(d => d.exercise === ex);
                const dataPoints = dates.map(d => {
                    const point = exData.find(x => x.date === d);
                    if (!point) return null;
                    return currentMetric === 'onerm' ? point.onerm : point.weight;
                });

                datasets.push({
                    label: ex,
                    data: dataPoints,
                    borderColor: colorMap[ex],
                    backgroundColor: colorMap[ex],
                    borderWidth: 3,
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    pointBackgroundColor: '#09090b',
                    pointBorderWidth: 2,
                    spanGaps: true,
                    tension: 0.4
                });
            });

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: dates.map(d => d.substring(5)), datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(24, 24, 27, 0.95)',
                            titleFont: { size: 12 },
                            bodyFont: { size: 13, weight: 'bold' },
                            padding: 12,
                            borderColor: 'rgba(63, 63, 70, 0.8)',
                            borderWidth: 1,
                            cornerRadius: 8,
                            usePointStyle: true,
                            callbacks: { label: (context) => ` ${context.dataset.label}: ${context.parsed.y} kg` }
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255, 255, 255, 0.03)', drawBorder: false },
                            ticks: { padding: 8, font: { size: 11 } }
                        },
                        x: { 
                            grid: { display: false, drawBorder: false },
                            ticks: { padding: 8, font: { size: 11 } }
                        }
                    }
                }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('pr-table-body');
            const prs = {};

            chartData.forEach(d => {
                if (!prs[d.exercise] || d.onerm > prs[d.exercise].onerm) {
                    prs[d.exercise] = { onerm: d.onerm, weight: d.weight, date: d.date };
                }
            });

            const sortedExercises = Object.keys(prs).sort((a, b) => prs[b].onerm - prs[a].onerm);

            sortedExercises.forEach(ex => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-zinc-800/40 transition-colors";
                tr.innerHTML = `
                    <td class="py-3.5 px-4 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full" style="background-color: ${colorMap[ex]}"></div>
                        <span class="font-medium text-slate-300">${ex}</span>
                    </td>
                    <td class="py-3.5 px-4 text-right font-bold text-indigo-400">${prs[ex].onerm} kg</td>
                    <td class="py-3.5 px-4 text-right text-slate-400">${prs[ex].weight} kg</td>
                    <td class="py-3.5 px-4 text-right text-slate-500 font-mono text-xs">${prs[ex].date}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        renderFilters();
        updateChart();
        renderTable();
    </script>
</body>
</html>
